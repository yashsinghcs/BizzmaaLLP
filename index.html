<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeThread | Boutique Collection</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #ff416c;
            --glass: rgba(255, 255, 255, 0.85);
            --white: #ffffff;
            --bg: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--primary); line-height: 1.6; }

        /* --- Navigation --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 900; font-size: 1.5rem; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--primary); font-size: 0.9rem; font-weight: 500; }

        /* --- Hero Banner --- */
        .hero-banner {
            width: 90%;
            max-width: 1000px;
            margin: 30px auto;
            height: 300px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://placehold.co/1000x300/000000/FFFFFF?text=Summer+Luxe+2026');
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            color: var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background: var(--white);
            color: var(--primary);
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }

        /* --- Gallery --- */
        .gallery-container { max-width: 1000px; margin: 0 auto; padding: 40px 5%; }
        .product-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .gallery-card { background: var(--white); border-radius: 20px; padding: 12px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .gallery-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .img-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; margin-bottom: 12px; }
        .info { text-align: center; }
        .price { color: var(--accent); font-weight: 700; }

        /* --- Footer --- */
        footer { background: #0f0f0f; padding: 60px 5% 20px; color: #fff; margin-top: 50px; }
        .footer-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        .footer-card { background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .footer-card h4 { color: var(--accent); margin-bottom: 10px; font-size: 0.8rem; }
        .footer-card a { color: #999; text-decoration: none; display: block; margin-bottom: 5px; }
        .footer-bottom { text-align: center; margin-top: 40px; color: #555; font-size: 0.7rem; }

        @media (max-width: 600px) {
            .nav-links { display: none; }
            .product-gallery { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VibeThread<span>.</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="/Design1/Ecommerce.html">Design1</a></li>
            <li><a href="/Design2/index.html">Design2</a></li>
            <li><a href="/Design3/index.html">Design3</a></li>
        </ul>
        <div class="nav-ui">🛒</div>
    </nav>

    <section class="hero-banner">
        <div class="banner-content">
            <h2>Summer Luxe 2026</h2>
            <p>Premium comfort in every thread.</p>
            <a href="#" class="btn-primary">Shop Now</a>
        </div>
    </section>

    <section class="gallery-container">
        <div class="product-gallery" id="product-gallery">
            </div>
    </section>

    <footer>
        <div class="footer-container">
            <div class="footer-card">
                <h4>VibeThread</h4>
                <p>"Quality over everything."</p>
            </div>
            <div class="footer-card">
                <h4>Support</h4>
                <a href="#">Size Guide</a>
                <a href="#">Shipping</a>
            </div>
            <div class="footer-card">
                <h4>Contact</h4>
                <p>hello@vibethread.in</p>
            </div>
        </div>
        <div class="footer-bottom">
            &copy; 2026 VibeThread Co.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
